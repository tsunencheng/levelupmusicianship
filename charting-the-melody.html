<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charting the Melody</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap');

  :root {
    --navy: #0E2A3D;
    --navy-deep: #081C2A;
    --navy-light: #1C3F56;
    --brass: #B8895C;
    --brass-bright: #D4A878;
    --parchment: #EDE3CE;
    --parchment-soft: #C9BFA8;
    --sea: #5A8C7A;
    --sea-bright: #7CB39E;
    --rust: #A8453A;
    --rust-bright: #C46358;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--navy);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(184,137,92,0.08) 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(90,140,122,0.08) 0%, transparent 45%);
    color: var(--parchment);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 64px;
  }

  .masthead {
    text-align: center;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(184,137,92,0.3);
  }
  .masthead .eyebrow {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--brass-bright);
    margin: 0 0 8px;
  }
  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 34px;
    margin: 0;
    color: var(--parchment);
    letter-spacing: 0.5px;
  }

  .level-rail {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .level-pip {
    flex: 1;
    min-width: 130px;
    border: 1px solid rgba(184,137,92,0.4);
    border-radius: 6px;
    padding: 10px 12px;
    background: rgba(13,42,61,0.4);
    cursor: pointer;
    text-align: left;
    position: relative;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .level-pip:hover:not(.locked) { transform: translateY(-2px); background: rgba(184,137,92,0.12); }
  .level-pip .lvl-num {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--parchment-soft);
    display: block;
    margin-bottom: 3px;
  }
  .level-pip .lvl-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--parchment);
  }
  .level-pip.active {
    background: var(--brass);
    border-color: var(--brass-bright);
  }
  .level-pip.active .lvl-num { color: var(--navy-deep); opacity: 0.7; }
  .level-pip.active .lvl-name { color: var(--navy-deep); }
  .level-pip.locked {
    cursor: not-allowed;
    opacity: 0.4;
  }
  .level-pip .charted-mini {
    position: absolute;
    top: -7px;
    right: -6px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--sea);
    color: var(--parchment);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--navy);
    font-weight: 700;
  }

  .chart-panel {
    background: rgba(8,28,42,0.55);
    border: 1px solid rgba(184,137,92,0.35);
    border-radius: 10px;
    padding: 28px 24px 26px;
    position: relative;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    font-size: 13px;
    color: var(--parchment-soft);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat-row .score-num {
    color: var(--brass-bright);
    font-weight: 700;
    font-size: 15px;
  }

  .chart-brief {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--parchment-soft);
    margin: 0 0 22px;
    line-height: 1.5;
    text-align: center;
  }

  .briefing-label {
    font-size: 13px;
    color: var(--parchment-soft);
    margin: 0 0 16px;
    text-align: center;
  }

  .listen-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 8px 0 26px;
  }
  .play-btn {
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: 2px solid var(--brass);
    background: rgba(184,137,92,0.12);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--brass-bright);
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .play-btn:hover { background: var(--brass); color: var(--navy-deep); }
  .play-btn:active { transform: scale(0.94); }
  .play-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .play-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--parchment-soft);
  }

  .briefing-rail {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 6px 0 22px;
    flex-wrap: wrap;
  }
  .ref-chip {
    border: 1px solid var(--brass);
    border-radius: 100px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--brass-bright);
    background: rgba(184,137,92,0.1);
    cursor: pointer;
  }
  .ref-chip:hover { background: rgba(184,137,92,0.25); }

  .contour-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 6px 0 22px;
  }
  @media (max-width: 480px) {
    .contour-grid { grid-template-columns: 1fr; }
  }
  .contour-card {
    border: 1.5px solid rgba(184,137,92,0.45);
    border-radius: 10px;
    background: rgba(184,137,92,0.06);
    padding: 14px 10px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
  }
  .contour-card:hover:not(.locked-card) {
    transform: translateY(-2px);
    background: rgba(184,137,92,0.16);
    border-color: var(--brass-bright);
  }
  .contour-card svg { width: 100%; height: 92px; display: block; }
  .contour-card .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--parchment-soft);
  }
  .contour-card.selected {
    border-color: var(--brass-bright);
    background: rgba(184,137,92,0.22);
  }
  .contour-card.correct-card {
    border-color: var(--sea-bright);
    background: rgba(90,140,122,0.18);
  }
  .contour-card.wrong-card {
    border-color: var(--rust-bright);
    background: rgba(168,69,58,0.18);
  }
  .contour-card.locked-card { cursor: default; }

  button.chart-btn {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    background: var(--brass);
    color: var(--navy-deep);
    border: none;
    border-radius: 100px;
    padding: 13px 26px;
    cursor: pointer;
    font-weight: 700;
    display: block;
    margin: 0 auto;
    transition: background 0.12s ease, transform 0.12s ease;
  }
  button.chart-btn:hover { background: var(--brass-bright); transform: translateY(-1px); }
  button.chart-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  button.chart-btn.ghost {
    background: transparent;
    color: var(--brass-bright);
    border: 1px solid var(--brass);
  }
  button.chart-btn.ghost:hover { background: rgba(184,137,92,0.12); }

  .feedback-line {
    text-align: center;
    font-size: 13px;
    min-height: 20px;
    color: var(--parchment-soft);
    margin-top: 4px;
    font-style: italic;
  }

  .log-complete {
    text-align: center;
    padding: 16px 0 4px;
  }
  .log-complete h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    margin: 0 0 8px;
    color: var(--parchment);
  }
  .log-complete p {
    color: var(--parchment-soft);
    font-size: 14px;
    margin: 0 0 20px;
  }

  .footer-note {
    margin-top: 22px;
    font-size: 12px;
    color: var(--parchment-soft);
    text-align: center;
    line-height: 1.7;
    opacity: 0.7;
  }

  @media (max-width: 480px) {
    .masthead h1 { font-size: 26px; }
    .chart-panel { padding: 22px 16px 20px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <p class="eyebrow">A melodic dictation voyage</p>
    <h1>Charting the Melody</h1>
  </div>

  <div class="level-rail" id="levelRail"></div>

  <div class="chart-panel" id="chartPanel">
    <div class="stat-row" id="statRow" style="display:none;">
      <span id="statLeft">Voyage 1 of 5</span>
      <span>Charted: <span class="score-num" id="scoreNum">0</span></span>
    </div>

    <p class="chart-brief" id="chartBrief"></p>

    <div id="briefingState">
      <p class="briefing-label">Get your bearings before you set sail. Tap to hear each move.</p>
      <div class="briefing-rail" id="briefingRail"></div>
      <button class="chart-btn" id="setSailBtn" style="width:100%;">Set sail</button>
    </div>

    <div id="playState" style="display:none;">
      <div class="listen-zone">
        <button class="play-btn" id="playBtn" aria-label="Play phrase">&#9658;</button>
        <span class="play-label" id="playLabel">Tap to hear the phrase</span>
      </div>

      <div class="contour-grid" id="contourGrid"></div>

      <div class="feedback-line" id="feedbackLine">&nbsp;</div>
    </div>

    <div id="completeState" style="display:none;" class="log-complete">
      <h2 id="completeTitle"></h2>
      <p id="completeBody"></p>
      <button class="chart-btn" id="nextLevelBtn">Sail to next voyage</button>
      <button class="chart-btn ghost" id="retryBtn" style="margin-left:8px;">Chart this voyage again</button>
    </div>
  </div>

  <p class="footer-note">Synthesised tones &mdash; no files, no installs.<br>A companion piece to Chord Detectives in the Level Up Musicianship library.</p>

</div>

<script>
(function(){

  let actx = null;
  function ctx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  }
  function noteFreq(semitoneFromA4) {
    return 440 * Math.pow(2, semitoneFromA4 / 12);
  }
  function playTone(freq, startOffset, duration=0.55) {
    const ac = ctx();
    const now = ac.currentTime + startOffset;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.26, now + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    gain.connect(ac.destination);

    const osc = ac.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, now);
    const osc2 = ac.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2, now);
    const g2 = ac.createGain();
    g2.gain.value = 0.15;
    osc2.connect(g2);
    g2.connect(gain);
    osc.connect(gain);
    osc.start(now);
    osc2.start(now);
    osc.stop(now + duration + 0.05);
    osc2.stop(now + duration + 0.05);
  }
  function playPhrase(freqs, gap=0.6) {
    if (ctx().state === 'suspended') ctx().resume();
    freqs.forEach((f, i) => playTone(f, i * gap));
  }

  const PENTATONIC = { d: -9, r: -7, m: -5, s: -2, l: 0 };
  const DIATONIC = { d: -9, r: -7, m: -5, f: -4, s: -2, l: 0, t: 2, "d2": 3 };

  function freqOf(scaleMap, key) {
    return noteFreq(scaleMap[key]);
  }

  const LEVELS = [
    {
      id: 1, name: 'Calm Waters', voyages: 5,
      scale: 'pentatonic', order: ['d','r','m'], noteCount: 5,
      brief: 'The water is still and the notes move gently. Listen for the shape of the whole phrase.'
    },
    {
      id: 2, name: 'Open Sea', voyages: 6,
      scale: 'pentatonic', order: ['d','r','m','s','l'], noteCount: 5,
      brief: 'The swells grow wider, with more pitches to choose from. Still just up, down, or steady.'
    },
    {
      id: 3, name: 'Reading the Stars', voyages: 6,
      scale: 'pentatonic', order: ['d','r','m','s','l'], noteCount: 6,
      brief: 'A longer course to chart \u2014 the same five pitches, but more moves to follow in one phrase.'
    },
    {
      id: 4, name: 'Open Ocean', voyages: 8,
      scale: 'diatonic', order: ['d','r','m','f','s','l','t','d2'], noteCount: 6,
      brief: 'Full open water, the whole scale ahead of you. Chart your course with everything you\u2019ve learned.'
    }
  ];

  let progress = JSON.parse(sessionStorage.getItem('ctm_progress') || '{"unlocked":1,"stars":{}}');
  let currentLevelIdx = 0;
  let currentNotes = null;
  let currentIndices = null;
  let optionIndicesList = null;
  let lastPhraseKey = null;
  let correctOptionIdx = null;
  let voyageIndex = 0;
  let score = 0;
  let answered = false;

  const levelRail = document.getElementById('levelRail');
  const chartBrief = document.getElementById('chartBrief');
  const statRow = document.getElementById('statRow');
  const statLeft = document.getElementById('statLeft');
  const scoreNum = document.getElementById('scoreNum');
  const playBtn = document.getElementById('playBtn');
  const playLabel = document.getElementById('playLabel');
  const feedbackLine = document.getElementById('feedbackLine');
  const briefingState = document.getElementById('briefingState');
  const briefingRail = document.getElementById('briefingRail');
  const setSailBtn = document.getElementById('setSailBtn');
  const playState = document.getElementById('playState');
  const contourGrid = document.getElementById('contourGrid');
  const completeState = document.getElementById('completeState');
  const completeTitle = document.getElementById('completeTitle');
  const completeBody = document.getElementById('completeBody');

  function saveProgress() {
    sessionStorage.setItem('ctm_progress', JSON.stringify(progress));
  }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Heights are derived from the *true semitone value* of each scale degree,
  // not from its array position. This guarantees: same pitch -> same height,
  // always; different pitch -> different height, always; and semitone gaps
  // (mi-fa, ti-high do) read as visually closer together than whole-tone
  // gaps, matching how they actually sound.
  function indicesToHeights(indices, level) {
    const map = level.scale === 'diatonic' ? DIATONIC : PENTATONIC;
    return indices.map(i => map[level.order[i]]);
  }

  function labelText(key) {
    const map = { up: 'Up', down: 'Down', same: 'Same' };
    return map[key] || key;
  }

  function generatePhrase(level) {
    const order = level.order;
    const indices = [Math.floor(Math.random() * order.length)];
    for (let i = 1; i < level.noteCount; i++) {
      let nextIdx, attempts = 0;
      do {
        nextIdx = Math.floor(Math.random() * order.length);
        attempts++;
      } while (nextIdx === indices[i-1] && Math.random() < 0.7 && attempts < 6);
      indices.push(nextIdx);
    }
    const notes = indices.map(i => order[i]);
    const moves = [];
    for (let i = 1; i < indices.length; i++) {
      moves.push(moveLabelFor(indices[i-1], indices[i]));
    }
    return { notes, moves, indices };
  }

  function moveLabelFor(fromIdx, toIdx) {
    const diff = toIdx - fromIdx;
    if (diff === 0) return 'same';
    return diff > 0 ? 'up' : 'down';
  }

  function movesFromIndices(indices) {
    const moves = [];
    for (let i = 1; i < indices.length; i++) {
      moves.push(moveLabelFor(indices[i-1], indices[i]));
    }
    return moves;
  }

  function freqsForNotes(level, notes) {
    const map = level.scale === 'diatonic' ? DIATONIC : PENTATONIC;
    return notes.map(n => freqOf(map, n));
  }

  function indexKey(indices) { return indices.join(','); }

  // Distractors are alternate note-index sequences (real, playable-shaped
  // paths through the scale), generated by nudging one note up or down by
  // one scale-degree at a time until the resulting move-label sequence
  // differs from the correct one by exactly one move. This keeps the
  // "near miss" difficulty while guaranteeing every option's graph reflects
  // its own real pitch sequence.
  function generateOptionIndices(correctIndices, maxIdx) {
    const correctMoves = movesFromIndices(correctIndices);
    const existingIdxKeys = new Set([indexKey(correctIndices)]);
    const optionsIndices = [correctIndices];
    let guardCount = 0;

    while (optionsIndices.length < 4 && guardCount < 120) {
      guardCount++;
      const candidate = correctIndices.slice();
      const pos = 1 + Math.floor(Math.random() * (candidate.length - 1)); // never nudge the first note
      const direction = Math.random() < 0.5 ? -1 : 1;
      let nudged = candidate[pos] + direction;
      if (nudged < 0) nudged = 1;
      if (nudged > maxIdx) nudged = maxIdx - 1;
      if (nudged === candidate[pos]) continue;
      candidate[pos] = nudged;

      const idxKey = indexKey(candidate);
      if (existingIdxKeys.has(idxKey)) continue;

      const candidateMoves = movesFromIndices(candidate);
      const diffCount = candidateMoves.reduce((acc, m, i) => acc + (m === correctMoves[i] ? 0 : 1), 0);
      if (diffCount === 1) {
        existingIdxKeys.add(idxKey);
        optionsIndices.push(candidate);
      }
    }

    // fallback: relax to "at least 1 move different" if we couldn't fill 4 slots
    guardCount = 0;
    while (optionsIndices.length < 4 && guardCount < 200) {
      guardCount++;
      const candidate = correctIndices.slice();
      const pos = 1 + Math.floor(Math.random() * (candidate.length - 1));
      candidate[pos] = Math.floor(Math.random() * (maxIdx + 1));
      const idxKey = indexKey(candidate);
      if (existingIdxKeys.has(idxKey)) continue;
      existingIdxKeys.add(idxKey);
      optionsIndices.push(candidate);
    }
    return optionsIndices;
  }

  function buildSquiggleSVG(heights, globalMin, globalMax, moveLabels) {
    const w = 220, h = 100, padX = 18, padY = 16;
    const minH = globalMin !== undefined ? globalMin : Math.min(...heights);
    const maxH = globalMax !== undefined ? globalMax : Math.max(...heights);
    const range = Math.max(maxH - minH, 1);
    const n = heights.length;
    const stepX = (w - padX * 2) / (n - 1);

    const pts = heights.map((val, i) => {
      const x = padX + i * stepX;
      const norm = (val - minH) / range;
      const y = (h - padY) - norm * (h - padY * 2);
      return [x, y];
    });

    // faint horizontal gridline at every distinct pitch height actually
    // used by this level's scale, so the eye has a ruler to judge step vs
    // leap distance against (semitone gaps draw closer together than
    // whole-tone gaps, since both use the same real semitone scale)
    let gridlines = '';
    const seenLevels = new Set();
    heights.forEach(val => {
      if (seenLevels.has(val)) return;
      seenLevels.add(val);
      const norm = (val - minH) / range;
      const y = (h - padY) - norm * (h - padY * 2);
      gridlines += `<line x1="${padX}" y1="${y.toFixed(1)}" x2="${w - padX}" y2="${y.toFixed(1)}" stroke="var(--brass)" stroke-width="1" opacity="0.12"/>`;
    });

    // every segment is either "held" (same pitch, dashed) or "moved"
    // (up or down, solid) -- no step/leap distinction in this game, just
    // clean contour reading.
    let segments = '';
    for (let i = 1; i < pts.length; i++) {
      const x0 = pts[i-1][0], y0 = pts[i-1][1];
      const x1 = pts[i][0], y1 = pts[i][1];
      const label = moveLabels ? moveLabels[i-1] : null;
      const isSame = label === 'same';
      const mx = (x0 + x1) / 2, my = (y0 + y1) / 2;
      let stroke, width, dash;
      if (isSame) { stroke = 'var(--parchment-soft)'; width = 2; dash = '4,3'; }
      else { stroke = 'var(--parchment)'; width = 2.5; dash = 'none'; }
      const dashAttr = dash !== 'none' ? ` stroke-dasharray="${dash}"` : '';
      segments += `<path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} Q ${x0.toFixed(1)} ${y0.toFixed(1)} ${mx.toFixed(1)} ${my.toFixed(1)} Q ${x1.toFixed(1)} ${y1.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)}" fill="none" stroke="${stroke}" stroke-width="${width}" stroke-linecap="round"${dashAttr}/>`;
    }

    let dots = '';
    pts.forEach(p => {
      dots += `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="var(--brass-bright)" stroke="var(--navy-deep)" stroke-width="1"/>`;
    });

    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      ${gridlines}
      ${segments}
      ${dots}
    </svg>`;
  }

  function renderLevelRail() {
    levelRail.innerHTML = '';
    LEVELS.forEach((lvl, i) => {
      const locked = lvl.id > progress.unlocked;
      const pip = document.createElement('button');
      pip.className = 'level-pip' + (i === currentLevelIdx ? ' active' : '') + (locked ? ' locked' : '');
      pip.disabled = locked;
      pip.innerHTML =
        '<span class="lvl-num">Voyage ' + lvl.id + '</span>' +
        '<span class="lvl-name">' + lvl.name + '</span>';
      if (progress.stars[lvl.id]) {
        const st = document.createElement('span');
        st.className = 'charted-mini';
        st.textContent = '\u2713';
        pip.appendChild(st);
      }
      pip.addEventListener('click', () => { if (!locked) { currentLevelIdx = i; startLevel(); } });
      levelRail.appendChild(pip);
    });
  }

  function startLevel() {
    const lvl = LEVELS[currentLevelIdx];
    voyageIndex = 0;
    score = 0;
    lastPhraseKey = null;
    chartBrief.textContent = lvl.brief;
    completeState.style.display = 'none';
    playState.style.display = 'none';
    statRow.style.display = 'none';
    briefingState.style.display = 'block';
    renderLevelRail();
    buildBriefing(lvl);
  }

  function buildBriefing(lvl) {
    briefingRail.innerHTML = '';
    const map = lvl.scale === 'diatonic' ? DIATONIC : PENTATONIC;
    const order = lvl.order;
    const refMoves = ['up','down','same'];
    refMoves.forEach(key => {
      const chip = document.createElement('button');
      chip.className = 'ref-chip';
      chip.textContent = labelText(key);
      chip.addEventListener('click', () => {
        if (ctx().state === 'suspended') ctx().resume();
        let fromI = 0, toI = 1;
        if (key === 'down') { fromI = 2; toI = 0; }
        if (key === 'same') { fromI = 1; toI = 1; }
        const f1 = freqOf(map, order[Math.min(fromI, order.length-1)]);
        const f2 = freqOf(map, order[Math.min(toI, order.length-1)]);
        playPhrase([f1, f2], 0.5);
      });
      briefingRail.appendChild(chip);
    });
  }

  setSailBtn.addEventListener('click', () => {
    briefingState.style.display = 'none';
    statRow.style.display = 'flex';
    playState.style.display = 'block';
    nextVoyage();
  });

  function nextVoyage() {
    const lvl = LEVELS[currentLevelIdx];
    answered = false;
    statLeft.textContent = 'Voyage ' + (voyageIndex + 1) + ' of ' + lvl.voyages;
    scoreNum.textContent = score;
    feedbackLine.innerHTML = '&nbsp;';
    playBtn.disabled = false;
    playLabel.textContent = 'Tap to hear the phrase';

    let phrase = generatePhrase(lvl);
    let key = indexKey(phrase.indices);
    // avoid serving the exact same phrase as the immediately previous round
    let guardCount = 0;
    while (key === lastPhraseKey && guardCount < 8) {
      phrase = generatePhrase(lvl);
      key = indexKey(phrase.indices);
      guardCount++;
    }
    lastPhraseKey = key;

    currentNotes = phrase.notes;
    currentIndices = phrase.indices;

    const maxIdx = lvl.order.length - 1;
    const optionsIndices = generateOptionIndices(currentIndices, maxIdx);
    const order = shuffle(optionsIndices.map((m, i) => i));
    optionIndicesList = order.map(i => optionsIndices[i]);
    correctOptionIdx = optionIndicesList.indexOf(currentIndices);

    renderContourGrid();
  }

  function renderContourGrid() {
    contourGrid.innerHTML = '';
    const lvl = LEVELS[currentLevelIdx];
    const allHeights = optionIndicesList.map(indices => indicesToHeights(indices, lvl));
    const globalMin = Math.min(...allHeights.flat());
    const globalMax = Math.max(...allHeights.flat());

    optionIndicesList.forEach((indices, i) => {
      const heights = indicesToHeights(indices, lvl);
      const moveLabels = movesFromIndices(indices);
      const card = document.createElement('div');
      card.className = 'contour-card';
      card.innerHTML = buildSquiggleSVG(heights, globalMin, globalMax, moveLabels) + '<span class="card-label">Course ' + String.fromCharCode(65 + i) + '</span>';
      card.addEventListener('click', () => handleCardSelect(i, card));
      contourGrid.appendChild(card);
    });
  }

  function handleCardSelect(idx, cardEl) {
    if (answered) return;
    answered = true;

    const cards = contourGrid.querySelectorAll('.contour-card');
    cards.forEach(c => c.classList.add('locked-card'));
    cardEl.classList.add('selected');

    const isCorrect = idx === correctOptionIdx;
    if (isCorrect) score++;
    scoreNum.textContent = score;

    cards[correctOptionIdx].classList.add('correct-card');
    if (!isCorrect) cardEl.classList.add('wrong-card');

    feedbackLine.textContent = isCorrect
      ? 'Course charted true.'
      : 'Not quite \u2014 the true course is marked.';
    playLabel.textContent = 'Tap to hear it again';

    setTimeout(() => {
      voyageIndex++;
      const lvl = LEVELS[currentLevelIdx];
      if (voyageIndex >= lvl.voyages) {
        finishLevel();
      } else {
        nextVoyage();
      }
    }, 3500);
  }

  function playCurrentPhrase() {
    if (ctx().state === 'suspended') ctx().resume();
    const lvl = LEVELS[currentLevelIdx];
    playPhrase(freqsForNotes(lvl, currentNotes));
  }

  function finishLevel() {
    const lvl = LEVELS[currentLevelIdx];
    playState.style.display = 'none';
    completeState.style.display = 'block';

    const passThreshold = Math.ceil(lvl.voyages * 0.6);
    const passed = score >= passThreshold;

    completeTitle.textContent = passed ? 'Voyage complete' : 'Course incomplete';
    completeBody.textContent = 'You charted ' + score + ' of ' + lvl.voyages + ' phrases correctly.' +
      (passed ? ' Well navigated \u2014 the next voyage awaits.' : ' Chart this voyage again before sailing onward.');

    if (passed) {
      progress.stars[lvl.id] = true;
      if (lvl.id === progress.unlocked && progress.unlocked < LEVELS.length) {
        progress.unlocked = lvl.id + 1;
      }
      saveProgress();
    }
    renderLevelRail();

    const nextBtn = document.getElementById('nextLevelBtn');
    nextBtn.style.display = (passed && currentLevelIdx < LEVELS.length - 1) ? 'inline-block' : 'none';
  }

  playBtn.addEventListener('click', playCurrentPhrase);
  document.getElementById('retryBtn').addEventListener('click', startLevel);
  document.getElementById('nextLevelBtn').addEventListener('click', () => {
    currentLevelIdx = Math.min(currentLevelIdx + 1, LEVELS.length - 1);
    startLevel();
  });

  renderLevelRail();
  startLevel();

})();
</script>
